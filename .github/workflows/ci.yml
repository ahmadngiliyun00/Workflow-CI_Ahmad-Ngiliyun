name: Workflow CI - MLflow Project + Docker

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  train_and_dockerize:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns
      MLFLOW_EXPERIMENT_NAME: Student_Academic_Success_Basic

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 numpy pandas scikit-learn matplotlib

      # Retrain (Basic)
      - name: Run MLflow Project
        run: |
          mlflow run MLProject -e main --env-manager=local

      # Ambil RUN_ID terbaru dari mlruns
      - name: Get latest run_id
        id: runid
        run: |
          RUN_ID=$(ls -td mlruns/*/*/ | head -n 1 | awk -F'/' '{print $(NF-1)}')
          echo "RUN_ID=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Latest RUN_ID=$RUN_ID"

      # Upload mlruns (Skilled)
      - name: Upload mlruns (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns

      # Docker login
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build image from logged model (Advance)
      - name: Build Docker image with MLflow (from model)
        run: |
          mlflow models build-docker \
            -m "runs:/${{ steps.runid.outputs.RUN_ID }}/model" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/workflow-ci-student-success:latest"

      - name: Push Docker image
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/workflow-ci-student-success:latest"
