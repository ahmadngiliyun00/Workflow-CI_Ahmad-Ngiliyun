name: Workflow CI - MLflow Project

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  train_and_dockerize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0

      # (Basic) retrain model via MLflow Project
      - name: Run MLflow Project
        run: |
          mlflow run MLProject -e main --env-manager=local

      # (Skilled) upload tracking folder from project (pastikan path sesuai)
      - name: Upload MLProject mlruns (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: MLProject/mlruns

      # ---- Kriteria 4 (Advance): build docker image via mlflow build-docker + push ----
      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image with MLflow
        run: |
          mlflow build-docker -m MLProject -n ${{ secrets.DOCKERHUB_USERNAME }}/workflow-ci-student-success:${{ steps.vars.outputs.TAG }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/workflow-ci-student-success:${{ steps.vars.outputs.TAG }}
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/workflow-ci-student-success:${{ steps.vars.outputs.TAG }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/workflow-ci-student-success:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/workflow-ci-student-success:latest
